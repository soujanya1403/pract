name: Image Build & Push
on: workflow_dispatch
env:
  DOCKER_USER: ${{ vars.DREG_USER }}
  DOCKER_PASSWD: ${{ secrets.DREG_PASSWD }}
  IMAGE_NAME: docker.io/${{ vars.DREG_USER }}/image22:v${{ github.run_number }}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Image Build
      run: |
        git clone https://github.com/soujanya1403/pract.git
        cd pract
        ls -l
        docker info
        docker build -t ${{ env.IMAGE_NAME }} .
        docker images
    - name: Image Push
      run: |
       docker login -u ${{ env.DOCKER_USER }} -p ${{ env.DOCKER_PASSWD }}
       docker push ${{ env.IMAGE_NAME }} 
    - name: Deploy
      run: |
         echo "${{ secrets.LINUX_MACHINE_KEY }}"> key1
         chmod 400 key1
         ssh -i key1 -o StrictHostKeyChecking=no ${{ vars.OS_USER }}@${{ vars.REMOTO_MACHINE_IP}} docker run -d ${{ env.IMAGE_NAME }} 
    
    
    
    